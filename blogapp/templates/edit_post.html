{% load static %}

<!DOCTYPE html>
<html>
<head>

<title>Edit Post</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* PAGE BACKGROUND */

body{
background-image:url("{% static 'images/home-bg.jpg' %}");
background-size:cover;
background-position:center;
background-attachment:fixed;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* EDIT CARD */

.edit-box{
max-width:420px;
width:100%;
padding:25px;
background:rgba(63,38,38,0.35);
backdrop-filter:blur(12px);
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
animation:fadeIn 0.6s ease;
}

/* ANIMATION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* FORM STYLE */

input, textarea{
background:rgba(255,255,255,0.2) !important;
border:none !important;
color:white !important;
font-size:14px;
}

input::placeholder,
textarea::placeholder{
color:white;
}

/* IMAGE PREVIEW */

.post-preview{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
margin-bottom:15px;
}

/* BUTTON STYLE */

.btn-warning{
background:#ffb347;
border:none;
}

.btn-warning:hover{
background:#ffa733;
}

</style>

</head>

<body>

<div class="edit-box">

<h4 class="text-center mb-3">Edit Post</h4>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

{% if post.image %}
<img src="{{ post.image.url }}" class="post-preview">
{% endif %}

<div class="mb-2">

<input 
type="text" 
name="title" 
class="form-control" 
value="{{ post.title }}" 
placeholder="Post title">

</div>

<div class="mb-2">

<textarea 
name="content" 
rows="4" 
class="form-control" 
placeholder="Write your content...">{{ post.content }}</textarea>

</div>

<div class="mb-3">

<input 
type="file" 
name="image" 
class="form-control">

</div>

<div class="d-grid gap-2">

<button class="btn btn-warning btn-sm">

Update Post

</button>

<a href="/" class="btn btn-light btn-sm">

Cancel

</a>

</div>

</form>

</div>

</body>
</html>
